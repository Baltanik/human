version: "3.9"

services:
  # ── Backend (Express + SQLite) ────────────────────────────────────────────
  backend:
    build:
      context: .
      target: production
    container_name: human_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_PATH: /app/data/human.db
    volumes:
      - db_data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Nginx static) ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: builder
      args:
        VITE_API_URL: ""
    container_name: human_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Copy dist from builder into nginx image at runtime via entrypoint below
    # We override the image with a dedicated nginx stage — see Dockerfile.nginx
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    # Nginx serves /usr/share/nginx/html — we need to get the built dist there.
    # Use a named volume populated by the builder stage.
    volumes:
      - dist_files:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # One-shot service that copies the built dist into the shared volume
  dist_init:
    build:
      context: .
      target: builder
      args:
        VITE_API_URL: ""
    container_name: human_dist_init
    command: sh -c "cp -r /app/dist/. /dist/"
    volumes:
      - dist_files:/dist
    restart: "no"

volumes:
  db_data:
  dist_files:
