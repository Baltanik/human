# ============================================
# HUMAN MARKETING - rewido.it
# Aggiungere IN FONDO a /opt/one2one/app/deploy/caddy/Caddyfile
# NON modificare nulla sopra questo blocco.
# ============================================
rewido.it, www.rewido.it {
    @apex host rewido.it
    redir @apex https://www.rewido.it{uri} permanent

    reverse_proxy human_frontend:80 {
        health_uri /
        health_interval 30s
        header_up X-Forwarded-Proto https
    }

    encode gzip zstd

    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
        X-XSS-Protection "0"
        Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
        -X-Frame-Options
    }

    log {
        output stdout
        format json
    }
}
