server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend container
    # resolver 127.0.0.11 = DNS interno Docker; valid=5s forza re-resolve
    # dopo ogni rebuild evitando il caching dell'IP del container precedente.
    resolver 127.0.0.11 valid=5s;
    set $backend http://human_backend:3001;

    location /api/ {
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Static assets — long cache
    location ~* \.(js|css|woff2?|png|jpg|jpeg|webp|svg|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
